<!DOCTYPE html>
<html>
<head>
    <title>FIFA Game</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0b6623;
            color: white;
            text-align: center;
        }

        header {
            background-color: black;
            padding: 20px;
        }

        nav {
            background-color: #111;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        .hero {
            padding: 60px 20px;
            background: url('https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a') no-repeat center;
            background-size: cover;
        }

        .hero h1 {
            font-size: 50px;
        }

        .content {
            padding: 40px;
        }

        .btn {
            background-color: yellow;
            color: black;
            padding: 12px 25px;
            border: none;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: orange;
        }

        footer {
            background-color: black;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>FIFA World Game</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Teams</a>
    <a href="#">Tournaments</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h1>Welcome to FIFA</h1>
    <p>The Ultimate Football Experience</p>
    <button class="btn">Play Now</button>
</section>

<section class="content">
    <h2>About FIFA</h2>
    <p>
        FIFA is one of the most popular football video games in the world.
        Play with your favorite teams and compete in exciting tournaments.
    </p>
</section>

<footer>
    <p>© 2026 FIFA Game | Designed by Student</p>
</footer>

</body>
</html>
