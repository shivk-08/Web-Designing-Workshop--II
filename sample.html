<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

let day = 5;
    switch(day){
        case 1:
        console.log("Monday");
        break;
         case 2:
        console.log("Tuesday");
        break;
         case 3:
        console.log("Wednesday");
        break;
         case 4:
        console.log("Thursday");
        break;
         case 5:
        console.log("Friday");
        break;
         default:
        console.log("Weekend");
    }
    for(let i=1; i<=5; i++){
        console.log(i);
    }

    let i = 1;
    while(i <=5){
        console.log(i);
        i++
    }
    let j = 1;
    do{
        console.log(j);
        j++;
    }while (j<=5)
    </script>
</body>
</html>
